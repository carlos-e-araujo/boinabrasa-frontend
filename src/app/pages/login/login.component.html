<div class="login-wrapper container-fluid p-0 m-0">
  <div class="row g-0 h-100">
    
    <div class="col-12 col-md-6 d-flex align-items-center justify-content-center p-5">
      <img src="assets/boi_na_brasa_logo_large.png" alt="Boina Brasa Logo" class="img-fluid logo-img">
    </div>

    <div class="col-12 col-md-6 d-flex align-items-center justify-content-center p-4">
      <div class="card shadow-lg border-0 login-card w-100" style="max-width: 420px;">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <h2 class="fw-bold text-dark mb-1">Bem Vindo(a)!</h2>
            <p class="text-muted">Entre com suas credenciais para continuar</p>
          </div>

          <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
            {{ errorMessage }}
          </div>

          <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
            <div class="mb-3">
              <label for="login" class="form-label text-secondary fw-semibold">E-mail ou Login</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                <input type="text" class="form-control border-start-0 ps-0 bg-light" id="login" name="login"
                       [(ngModel)]="loginData.login" required placeholder="Digite seu login">
              </div>
            </div>

            <div class="mb-4">
              <label for="senha" class="form-label text-secondary fw-semibold">Senha</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" class="form-control border-start-0 ps-0 bg-light" id="senha" name="senha"
                       [(ngModel)]="loginData.senha" required placeholder="Digite sua senha">
              </div>
            </div>

            <button type="submit" class="btn btn-login w-100 py-2 fw-bold" [disabled]="!loginForm.form.valid || isLoading">
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              ENTRAR
            </button>
          </form>
        </div>
      </div>
    </div>

  </div>
</div>
